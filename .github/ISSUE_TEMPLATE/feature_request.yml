name: Feature Request
description: Propose an improvement or addition to any skill in this repository
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve one of the skills? We'd love to hear it.
        Please check that a similar request doesn't already exist before submitting.

  - type: dropdown
    id: target-skill
    attributes:
      label: Target Skill
      description: Which skill would this improve?
      options:
        - "🔴 devils-advocate"
        - "🛡️ sar-cybersecurity"
        - "📋 ai-rules"
        - "📦 Repository infrastructure (CI, templates, root docs)"
        - "🔜 postmortem-writing (planned)"
    validations:
      required: true

  - type: dropdown
    id: contribution-type
    attributes:
      label: Type of Contribution
      options:
        - "New domain framework — devils-advocate (frameworks/*.md)"
        - "New example — devils-advocate (examples/*.md)"
        - "New assessment pattern or edge case — sar-cybersecurity"
        - "New behavioral rule or estimation guidance — ai-rules"
        - "Improvement to existing framework, checklist, or rule"
        - "New checklist — devils-advocate"
        - "Core protocol change (SKILL.md or core framework file)"
        - "Other"
    validations:
      required: true

  - type: input
    id: domain
    attributes:
      label: Domain or Role
      description: Which role, domain, or area would benefit most from this addition?
      placeholder: "e.g. DevOps Engineer, sar-cybersecurity supply chain, ai-rules estimation"
    validations:
      required: false

  - type: textarea
    id: problem-statement
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation in the current skill that this would address.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe what you would like to add or change. If you have draft content, paste it here.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why did you choose this one?
    validations:
      required: false

  - type: checkboxes
    id: overlap-check
    attributes:
      label: Overlap Check
      options:
        - label: I have reviewed existing content and this does not duplicate it
          required: true
        - label: I have reviewed the existing examples (if applicable) and this covers a new scenario
          required: false
